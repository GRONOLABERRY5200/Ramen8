<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ramen8| My website</title>

    <style>

        :root {
            --header-image: url('https://ik.imagekit.io/fqbq1msdy/Untitled%20design%20(9).png');
            --body-bg-image: url('https://www.image2url.com/r2/default/images/1778424846604-065c4c96-37e2-4c0b-a167-23a461e121cb.gif');

            --content: #43256E;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: #fceaff;
            background-color: #08031A;
            background-image: var(--body-bg-image);
            background-size: 65px;
        }

        * {
            box-sizing: border-box;
        }

        #container {
            max-width: 900px;
            margin: 0 auto;
        }

        #header {
            width: 100%;
            height: 150px;
            background-color: #5e4e8c;
            background-image: var(--header-image);
            background-size: cover;
            background-position: center;
        }

        #navbar {
            background-color: #13092D;
            height: 40px;
        }

        #navbar ul {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            list-style: none;
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #navbar a {
            color: #ED64F5;
            text-decoration: none;
            font-weight: bold;
        }

        #navbar a:hover {
            text-decoration: underline;
        }

        #flex {
            display: flex;
        }

        aside {
            width: 220px;
            background-color: #241445;
            padding: 20px;
        }

        main {
            flex: 1;
            background-color: #43256E;
            padding: 20px;
        }

        h1, h2, h3 {
            color: #ED64F5;
        }

        strong {
            color: #ED64F5;
        }

        .box {
            background-color: #13092D;
            border: 1px solid #ED64F5;
            padding: 10px;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
        }

        a {
            color: #c77dff;
        }

        footer {
            background-color: #13092D;
            text-align: center;
            padding: 10px;
        }

        @media only screen and (max-width: 800px) {

            #flex {
                flex-wrap: wrap;
            }

            aside {
                width: 100%;
            }

        }

    </style>
</head>
